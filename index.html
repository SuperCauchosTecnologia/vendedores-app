<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Vendedores | Super Lub</title>
    <style>
        :root { --primary: #1e40af; --success: #16a34a; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; }
        .card { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; box-sizing: border-box; }
        .logo { text-align: center; font-weight: bold; color: var(--primary); font-size: 24px; margin-bottom: 20px; text-transform: uppercase; }
        h2 { text-align: center; color: #1e293b; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 14px; background-color: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; }
        .secondary-btn { background-color: #f8fafc; color: #475569; border: 1px solid #e2e8f0; margin-top: 10px; }
        .hidden { display: none !important; }
        #statusMsg { text-align: center; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="loginBox" class="card">
        <div class="logo">Super Lub</div>
        <h2>Acceso</h2>
        <input type="text" id="userInput" placeholder="Usuario">
        <input type="password" id="passInput" placeholder="Contraseña">
        <button onclick="handleLogin()">Entrar</button>
        <div id="statusMsg"></div>
    </div>

    <div id="registerBox" class="card hidden">
        <div class="logo">Super Lub</div>
        <h2>Panel de: <span id="displayName" style="color: var(--primary);"></span></h2>
        <input type="text" id="descInput" placeholder="Descripción de actividad">
        <input type="number" id="amtInput" placeholder="Monto ($)">
        <button onclick="handleSave()" style="background-color: var(--success);">Guardar Registro</button>
        <button onclick="logout()" class="secondary-btn">Cerrar Sesión</button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbw-cz9PRmgFjp0S_Psrtz88EHUAr1iorg3IPIDT02ascVu1-qZOENhCpZuMhv72pp-p/exec";

        // 1. COMPROBAR SESIÓN AL CARGAR LA PÁGINA
        window.onload = function() {
            const savedUser = localStorage.getItem("user_vendedor");
            const savedName = localStorage.getItem("nombre_vendedor");

            if (savedUser && savedName) {
                showPanel(savedName);
            }
        };

        async function handleLogin() {
            const u = document.getElementById('userInput').value.trim();
            const p = document.getElementById('passInput').value.trim();
            const msg = document.getElementById('statusMsg');

            if (!u || !p) return;
            msg.innerText = "Validando...";

            try {
                const resp = await fetch(`${API_URL}?user=${encodeURIComponent(u)}&pass=${encodeURIComponent(p)}`);
                const result = await resp.json();

                if (result.status === "success") {
                    // 2. GUARDAR EN EL NAVEGADOR
                    localStorage.setItem("user_vendedor", u);
                    localStorage.setItem("nombre_vendedor", result.name);
                    
                    showPanel(result.name);
                } else {
                    msg.innerText = "❌ " + result.message;
                    msg.style.color = "red";
                }
            } catch (e) {
                msg.innerText = "Error de conexión";
            }
        }

        function showPanel(name) {
            document.getElementById('displayName').innerText = name;
            document.getElementById('loginBox').classList.add('hidden');
            document.getElementById('registerBox').classList.remove('hidden');
        }

        async function handleSave() {
            const desc = document.getElementById('descInput').value;
            const amt = document.getElementById('amtInput').value;
            const user = localStorage.getItem("user_vendedor");

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ username: user, description: desc, amount: amt })
                });
                alert("✅ Guardado correctamente");
                document.getElementById('descInput').value = "";
                document.getElementById('amtInput').value = "";
            } catch (e) {
                alert("Error al guardar");
            }
        }

        // 3. CERRAR SESIÓN Y LIMPIAR TODO
        function logout() {
            localStorage.removeItem("user_vendedor");
            localStorage.removeItem("nombre_vendedor");
            location.reload();
        }
    </script>
</body>
</html>
